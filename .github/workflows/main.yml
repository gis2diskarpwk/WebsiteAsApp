name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode menggunakan v4 versi terbaru (atau v5 jika sudah rilis)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Java menggunakan v4 versi terbaru yang mendukung Node 24
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Langkah build proyek Anda (contoh menggunakan Maven)
    - name: Build with Maven
      run: mvn -B package --file pom.xml
